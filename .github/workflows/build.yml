name: Build cd-deluxe

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'CMake build type'
        required: false
        default: 'Release'
        type: choice
        options:
          - Release
          - Debug

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # macOS build
  # ─────────────────────────────────────────────────────────────────────────────
  build-macos:
    name: Build / macOS
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=${{ github.event.inputs.build_type || 'Release' }}

      - name: Build
        run: cmake --build build --config ${{ github.event.inputs.build_type || 'Release' }}

      - name: Run unit tests
        run: ctest --test-dir build --build-config ${{ github.event.inputs.build_type || 'Release' }} --output-on-failure

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cd-deluxe-macos
          path: build/main/cd-deluxe
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────────────────
  # Linux build (placeholder)
  # ─────────────────────────────────────────────────────────────────────────────
  build-linux:
    name: Build / Linux
    runs-on: ubuntu-latest
    if: false   # placeholder – remove this line when ready

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=${{ github.event.inputs.build_type || 'Release' }}

      - name: Build
        run: cmake --build build --config ${{ github.event.inputs.build_type || 'Release' }}

      - name: Run unit tests
        run: ctest --test-dir build --build-config ${{ github.event.inputs.build_type || 'Release' }} --output-on-failure

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cd-deluxe-linux
          path: build/main/cd-deluxe
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────────────────
  # Windows build (placeholder)
  # ─────────────────────────────────────────────────────────────────────────────
  build-windows:
    name: Build / Windows
    runs-on: windows-latest
    if: false   # placeholder – remove this line when ready

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=${{ github.event.inputs.build_type || 'Release' }}

      - name: Build
        run: cmake --build build --config ${{ github.event.inputs.build_type || 'Release' }}

      - name: Run unit tests
        run: ctest --test-dir build --build-config ${{ github.event.inputs.build_type || 'Release' }} --output-on-failure

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cd-deluxe-windows
          path: build/main/Release/cd-deluxe.exe
          if-no-files-found: error
