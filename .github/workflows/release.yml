---
name: Release

"on":
  push:
    tags:
      - "v*"    # triggers on tags like v2.0.6

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Build, test, and collect artifacts for each platform
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # get all history for build number calc in cmake

      # NSIS is required on Windows to build the installer.
      # After installing, its directory is added to GITHUB_PATH so that
      # CMake's find_program can locate makensis.exe in the next step.
      - name: Install NSIS (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          choco install nsis --yes

      # Multi-config generators (MSVC) ignore CMAKE_BUILD_TYPE; use
      # CMAKE_CONFIGURATION_TYPES instead to avoid a spurious CMake warning.
      - name: Configure CMake (Unix)
        if: matrix.os != 'windows-latest'
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Configure CMake (Windows)
        if: matrix.os == 'windows-latest'
        run: cmake -B build -DCMAKE_CONFIGURATION_TYPES=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Run unit tests
        run: ctest --test-dir build --build-config Release --output-on-failure

      # Windows only: build the NSIS installer after the main executable
      - name: Build installer (Windows)
        if: matrix.os == 'windows-latest'
        run: cmake --build build --config Release --target installer

      # Rename the Unix binary to include the platform so both can coexist
      # in the same release without filename collisions.
      - name: Stage artifact (Linux)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          mkdir -p staging
          cp build/main/cd-deluxe staging/cd-deluxe-linux

      - name: Stage artifact (macOS)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          mkdir -p staging
          cp build/main/cd-deluxe staging/cd-deluxe-macos

      - name: Upload artifact (Linux / macOS)
        if: matrix.os != 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: artifact-${{ matrix.os }}
          path: staging/
          if-no-files-found: error

      # The installer already contains the version in its filename
      # (e.g. CddInstaller_2.0.6.137.exe) so no rename is needed.
      - name: Upload artifact (Windows installer)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: artifact-${{ matrix.os }}
          path: mswin/CddInstaller_*.exe
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────────────────
  # Collect all platform artifacts and publish the GitHub Release
  # ─────────────────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./release-files
          pattern: artifact-*
          merge-multiple: true   # flatten into a single directory

      - name: List release files
        run: ls -lh ./release-files/

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes \
            ./release-files/*
